[build-system]
requires = ["setuptools>=61.0.0,<82", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sam3d-objects"
version = "0.0.1"
description = "Lightweight SAM3D wrapper with optional depth input"
requires-python = ">=3.11,<3.12"
dependencies = []

[tool.setuptools.packages.find]
include = ["sam3d_objects*"]

########################
# Pixi Workspace
########################
[tool.pixi.workspace]
channels = [
  "nvidia/label/cuda-12.8.0",
  "nvidia",
  "conda-forge",
]
platforms = ["linux-64"]

[tool.pixi.system-requirements]
cuda = "12.8"

########################
# Conda Dependencies
########################
[tool.pixi.dependencies]
python = ">=3.11,<3.12"
pip = "*"
git = "*"
cmake = "*"
ninja = "*"
make = "*"
pkg-config = "*"
compilers = "*"

# Align numpy with PyPI pin to avoid 2.x pull
numpy = "1.26.4.*"

# CUDA toolchain (from NVIDIA channel label)
cuda-toolkit = "12.8.*"

# Install pymeshlab from conda-forge (PyPI wheels do not match your platform tag)
pymeshlab = "*"

# Misc libs
gmp = "*"
libnuma = "*"
ocl-icd = "*"

# GUI helpers (optional)
qt-main = "*"
wayland = "*"
libxkbfile = "*"
xorg-libxcomposite = "*"
xorg-libxdamage = "*"
xorg-libxrandr = "*"
xorg-libxtst = "*"
jupyterlab = ">=4.5.1,<5"
optree = "==0.14.1"
natsort = ">=8.4.0,<9"
setuptools = "<70.0.0"
ipykernel = ">=7.2.0,<8"
argparer = "*"
argparser = "*"

########################
# PyPI Dependencies
########################
[tool.pixi.pypi-dependencies]
"sam3d-objects" = { path = ".", editable = true }

# Core dependencies for sam3d-simple
aiohttp = "==3.13.2"
astor = "==0.8.1"
cython = "==3.2.1"
easydict = "==1.13"
einops = "*"
numpy = "==1.26.4.*"
gsplat = "==1.5.3"
hydra-core = "==1.3.0"
imageio = "==2.37.2"
lightning = "==2.5.6"
loguru = "==0.7.*"
lovely-tensors = "==0.1.20"
omegaconf = "==2.3.0"
open3d = "==0.18.0"
opencv-python = "==4.10.0.84"
pandas = "==2.3.*"
pillow = "==11.3.0.*"
pymeshfix = "==0.17.0"
pynanoflann = "==0.10.0"
pyopengl = "==3.1.0"
pyqt5 = "==5.15.10"
pyqt5-sip = "==12.13.0"
pyvista = "==0.46.4"
timm = "==1.0.19"
torchmetrics = "==1.7.0"
tqdm = "==4.66.5"
trimesh = "==4.4.9"
vtk = "==9.5.1"
ipykernel = "*"
seaborn = "==0.13.2"
xatlas = "==0.0.11"
igraph = "==0.11.8"
spconv-cu120 = "==2.3.6"
# MoGe dependency
MoGe = { git = "https://github.com/microsoft/MoGe.git", rev = "a8c37341bc0325ca99b9d57981cc3bb2bd3e255b" }

########################
# Feature: PyTorch cu128 wheels
########################
[tool.pixi.feature.cuda128.pypi-dependencies]
torch = { version = "==2.8.0", index = "https://download.pytorch.org/whl/cu128" }
torchvision = { version = "==0.23.0", index = "https://download.pytorch.org/whl/cu128" }
torchaudio = { version = "==2.8.0", index = "https://download.pytorch.org/whl/cu128" }


########################
# Environments
########################
[tool.pixi.environments]
default = { features = ["cuda128"], solve-group = "default" }

[tool.pixi.activation.env]
# Match micromamba arch list and CUDA headers path for source builds
TORCH_CUDA_ARCH_LIST = "5.0;5.2;6.0;6.1;7.0;7.5;8.0;8.6;8.9;9.0;10.0;10.1;12.0+PTX"
CUDA_HOME = "/usr/local/cuda-12.8"

########################
# Tasks (source installs)
########################
[tool.pixi.tasks]
# Basic sanity checks
# torch-check = "python -c \"import torch; print('torch', torch.__version__); print('cuda', torch.version.cuda); print('is_available', torch.cuda.is_available()); print('device', torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'none')\""
# pymeshlab-check = "python -c \"import pymeshlab; print('pymeshlab import ok')\""

# Install PyTorch3D from Git tag (builds from source; required for cp311)
# Using v0.7.8 to match micromamba environment and avoid ABI mismatches
install-pytorch3d = "python -m pip install -v --no-build-isolation \"git+https://github.com/facebookresearch/pytorch3d.git@V0.7.8\""

# Install Kaolin from Git (editable install; adjust tag/commit if SAM3D requires a specific one)
install-kaolin = "python -m pip install -v --no-build-isolation \"git+https://github.com/NVIDIAGameWorks/kaolin.git@v0.18.0\""

# Install NVidia nvdiffrast with CUDA 12.8 include path patched into ops.py
install-nvdiffrast = "bash -lc 'set -euo pipefail; tmpdir=$(mktemp -d); trap \"rm -rf $tmpdir\" EXIT; git clone --depth 1 https://github.com/NVlabs/nvdiffrast.git \"$tmpdir/nvdiffrast\"; cd \"$tmpdir/nvdiffrast\"; sed -i \"s/\\['-DNVDR_TORCH'\\]/['-DNVDR_TORCH','-I\\/usr\\/local\\/cuda-12.8\\/include']/\" nvdiffrast/torch/ops.py; python -m pip install -v --no-build-isolation .'"

# Install diff_gaussian_rasterization from mip-splatting submodule
install-diff-gaussian-rasterization = "bash -lc 'set -euo pipefail; tmpdir=$(mktemp -d); trap \"rm -rf $tmpdir\" EXIT; git clone --recursive --depth 1 https://github.com/autonomousvision/mip-splatting.git \"$tmpdir/mip-splatting\"; cd \"$tmpdir/mip-splatting/submodules/diff-gaussian-rasterization\"; python -m pip install -v --no-build-isolation .'"

jupyterlab = {cmd = "jupyter lab --no-browser --ip=127.0.0.1 --port={{port}}", args = [{"arg" = "port", "default" = "6657"}]}

# Do everything
setup-all = "bash -lc 'pixi run install-pytorch3d && pixi run install-kaolin && pixi run install-nvdiffrast && pixi run install-diff-gaussian-rasterization'"

server = {args = [{"arg" = "port", "default" = "2334"}], cmd = "python -m uvicorn server:app --host 0.0.0.0 --port {{port}} --log-level info"}
