[workspace]
authors = ["Jim Li <jim.li@tum.de>"]
channels = ["nvidia/label/cuda-12.8.0", "nvidia", "conda-forge"]
name = "SAM3D-Objects"
platforms = ["linux-64"]
version = "0.1.0"


[dependencies]
python = "3.11.*"
cmake = "*"
ninja = "*"
gcc_linux-64 = "11.*"
gxx_linux-64 = "11.*"
make = "*"
pkg-config = "*"
compilers = "*"
cuda-toolkit = "12.8.*"
numpy = "1.26.4.*"
pymeshlab = "*"
gmp = "*"
libnuma = "*"
qt-main = "*"
libxkbfile = "*"
wayland = "*"
xorg-libxcomposite = "*"
xorg-libxdamage = "*"
xorg-libxrandr = "*"
xorg-libxtst = "*"
jupyterlab = ">=4.5.6,<5"
optree = "==0.14.1"
natsort = ">=8.4.0,<9"
setuptools = "<70.0.0"

[system-requirements]
cuda = "12.8"

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]
[pypi-dependencies]
pip = ">=26.0.1, <27"
"sam3d-objects" = { path = ".", editable = true }
torch = "==2.8.0"
torchvision = "==0.23.0"
torchaudio = "==2.8.0"
aiohttp = "==3.13.2"
astor = "==0.8.1"
cython = "==3.2.1"
easydict = "==1.13"
einops = "*"
gsplat = "==1.5.3"
hydra-core = "==1.3.0"
imageio = "==2.37.2"
lightning = "==2.5.6"
loguru = "==0.7.*"
lovely-tensors = "==0.1.20"
omegaconf = "==2.3.0"
open3d = "==0.18.0"
opencv-python = "==4.10.0.84"
pandas = "==2.3.*"
pillow = ">=11.0"
pymeshfix = "==0.17.0"
pynanoflann = "==0.10.0"
pyopengl = "==3.1.0"
pyqt5 = "==5.15.10"
pyqt5-sip = "==12.13.0"
pyvista = "==0.46.4"
timm = "==1.0.19"
torchmetrics = "*"
tqdm = "==4.66.5"
trimesh = "==4.4.9"
vtk = "==9.5.1"
ipykernel = "*"
seaborn = "==0.13.2"
xatlas = "==0.0.11"
igraph = "==0.11.8"
spconv-cu120 = "==2.3.6"
# MoGe dependency
MoGe = { git = "https://github.com/microsoft/MoGe.git", rev = "a8c37341bc0325ca99b9d57981cc3bb2bd3e255b" }
wheel = ">=0.46.3, <0.47"
pyarrow = ">=23.0.1,<24"

[activation.env]
# Match micromamba arch list and CUDA headers path for source builds
TORCH_CUDA_ARCH_LIST = "5.0;5.2;6.0;6.1;7.0;7.5;8.0;8.6;8.9;9.0;10.0;10.1;12.0+PTX"
CUDA_HOME = "/usr/local/cuda-12.8"
# MAX_JOBS = "1"
# CPATH = "/usr/local/cuda-12.8/include"

[tasks]
install-pytorch3d = "pip install -v --no-build-isolation \"git+https://github.com/facebookresearch/pytorch3d.git@V0.7.8\""
install-kaolin = "pip install -v --no-build-isolation \"git+https://github.com/NVIDIAGameWorks/kaolin.git@v0.18.0\""
install-nvdiffrast = "pip install git+https://github.com/NVlabs/nvdiffrast.git --no-build-isolation"
# install-diff-gaussian-rasterization = "bash -lc 'set -euo pipefail; tmpdir=$(mktemp -d); trap \"rm -rf $tmpdir\" EXIT; git clone --recursive --depth 1 https://github.com/autonomousvision/mip-splatting.git \"$tmpdir/mip-splatting\"; cd \"$tmpdir/mip-splatting/submodules/diff-gaussian-rasterization\"; python -m pip install -v --no-build-isolation .'"
install-diff-rasterization = { cmd = "pip install git+https://github.com/autonomousvision/mip-splatting.git#subdirectory=submodules/diff-gaussian-rasterization --no-build-isolation" }
install-gsplat = "pip install --no-cache-dir --verbose --no-build-isolation git+https://github.com/nerfstudio-project/gsplat.git@2323de5905d5e90e035f792fe65bad0fedd413e7"
install-flashattn = { cmd = "pip install flash-attn --no-build-isolation --no-cache-dir" }

install-all = { depends-on = [
    "install-diff-rasterization",
    "install-pytorch3d",
    "install-kaolin",
    "install-nvdiffrast",
    "install-gsplat",
    "install-flashattn",
] }
